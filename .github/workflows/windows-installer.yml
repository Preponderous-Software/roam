name: Windows Installer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the Linux Tests job. requirements.txt now uses lower bounds,
          # so the wizard's `pip install -r requirements.txt` resolves modern
          # wheels here — exercising that the installer works on a current Python.
          python-version: "3.12"

      - name: Run the installation wizard (non-interactive)
        shell: pwsh
        run: .\install.ps1 -NonInteractive

      - name: Verify the wizard produced its artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "src/media/icon.ico")) {
              throw "Expected src/media/icon.ico to be generated by the wizard"
          }
          $desktop = Join-Path ([Environment]::GetFolderPath("Desktop")) "Roam.lnk"
          if (-not (Test-Path $desktop)) {
              throw "Expected Desktop shortcut at $desktop"
          }
          $startMenu = Join-Path ([Environment]::GetFolderPath("Programs")) "Roam.lnk"
          if (-not (Test-Path $startMenu)) {
              throw "Expected Start Menu shortcut at $startMenu"
          }
          Write-Host "Installer artifacts present: icon.ico, Desktop and Start Menu shortcuts."

      - name: Run tests on Windows
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        # The wizard already installed pygame and everything in requirements.txt
        # (which includes pytest), so the suite can run directly here. This also
        # gives Roam a Windows-native test run alongside the Linux Tests job.
        run: python -m pytest -q

  package:
    # Build the standalone PyInstaller executable and smoke-test that the
    # frozen bundle can locate its data files (assets, schemas, config).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate the icon (matches install.ps1)
        shell: pwsh
        run: |
          python -c "from PIL import Image; Image.open('src/media/icon.PNG').save('src/media/icon.ico', sizes=[(16,16),(32,32),(48,48),(256,256)])"

      - name: Build the executable
        shell: pwsh
        run: pyinstaller roam.spec --noconfirm

      - name: Smoke-test the frozen bundle
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "dist/Roam/Roam.exe"
          if (-not (Test-Path $exe)) { throw "Expected built executable at $exe" }
          & $exe --selftest
          if ($LASTEXITCODE -ne 0) { throw "Frozen bundle selftest failed (exit $LASTEXITCODE)" }
          Write-Host "Frozen bundle selftest passed."

      - name: Upload the build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roam-windows
          path: dist/Roam/
