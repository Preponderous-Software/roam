name: Windows Installer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the Linux Tests job. requirements.txt now uses lower bounds,
          # so the wizard's `pip install -r requirements.txt` resolves modern
          # wheels here — exercising that the installer works on a current Python.
          python-version: "3.12"

      - name: Run the installation wizard (non-interactive)
        shell: pwsh
        run: .\install.ps1 -NonInteractive

      - name: Verify the wizard produced its artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "src/media/icon.ico")) {
              throw "Expected src/media/icon.ico to be generated by the wizard"
          }
          $desktop = Join-Path ([Environment]::GetFolderPath("Desktop")) "Roam.lnk"
          if (-not (Test-Path $desktop)) {
              throw "Expected Desktop shortcut at $desktop"
          }
          $startMenu = Join-Path ([Environment]::GetFolderPath("Programs")) "Roam.lnk"
          if (-not (Test-Path $startMenu)) {
              throw "Expected Start Menu shortcut at $startMenu"
          }
          Write-Host "Installer artifacts present: icon.ico, Desktop and Start Menu shortcuts."

      - name: Run tests on Windows
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        # The wizard already installed pygame and everything in requirements.txt
        # (which includes pytest), so the suite can run directly here. This also
        # gives Roam a Windows-native test run alongside the Linux Tests job.
        run: python -m pytest -q

  package:
    # Build the standalone PyInstaller executable and smoke-test that the
    # frozen bundle can locate its data files (assets, schemas, config).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate the icon (matches install.ps1)
        shell: pwsh
        run: |
          python -c "from PIL import Image; Image.open('src/media/icon.PNG').save('src/media/icon.ico', sizes=[(16,16),(32,32),(48,48),(256,256)])"

      - name: Build the executable
        shell: pwsh
        run: pyinstaller roam.spec --noconfirm

      - name: Smoke-test the frozen bundle
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "dist/Roam/Roam.exe"
          if (-not (Test-Path $exe)) { throw "Expected built executable at $exe" }
          # Roam.exe is a windowed (console=False) app, so `& $exe` does not set
          # $LASTEXITCODE; Start-Process -Wait -PassThru reliably captures it.
          $proc = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) { throw "Frozen bundle selftest failed (exit $($proc.ExitCode))" }
          Write-Host "Frozen bundle selftest passed."

      - name: Upload the build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roam-windows
          path: dist/Roam/

      - name: Build the setup installer (Inno Setup)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup compiler not found at $iscc" }
          & $iscc roam.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path "installer-output/RoamSetup.exe")) {
              throw "Expected installer at installer-output/RoamSetup.exe"
          }

      - name: Install, self-test, and uninstall (end-to-end)
        shell: pwsh
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          $ErrorActionPreference = "Stop"
          $setup = Resolve-Path "installer-output/RoamSetup.exe"
          # Silent install into Program Files (the read-only-install scenario).
          $p = Start-Process -FilePath $setup -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Silent install failed (exit $($p.ExitCode))" }
          $installed = "$env:ProgramFiles\Roam\Roam.exe"
          if (-not (Test-Path $installed)) { throw "Installed executable not found at $installed" }
          # The installed app must locate its bundled data and write to %APPDATA%.
          $st = Start-Process -FilePath $installed -ArgumentList "--selftest" -Wait -PassThru -NoNewWindow
          if ($st.ExitCode -ne 0) { throw "Installed app selftest failed (exit $($st.ExitCode))" }
          Write-Host "Installed app selftest passed."
          # Silent uninstall.
          $uninstall = "$env:ProgramFiles\Roam\unins000.exe"
          if (Test-Path $uninstall) {
              $u = Start-Process -FilePath $uninstall -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait -PassThru
              if ($u.ExitCode -ne 0) { throw "Silent uninstall failed (exit $($u.ExitCode))" }
          }
          Write-Host "Install / self-test / uninstall round-trip passed."

      - name: Upload the installer
        uses: actions/upload-artifact@v4
        with:
          name: roam-setup
          path: installer-output/RoamSetup.exe
