name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pytest pytest-cov jsonschema Pillow structlog
          pip install "black==23.1.0"

      - name: Check formatting (black)
        # Pinned to the version the repo's format.sh contributors use, so the
        # gate's verdict matches a local `./format.sh` run. Fails the build on
        # any formatting drift (the gap that let drift accumulate on main).
        run: python -m black --check src tests

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest --verbose -vv --cov=src --cov-report=term-missing
