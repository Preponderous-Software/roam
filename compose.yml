# Docker Compose configuration for Roam

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: roam-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roam}
      POSTGRES_USER: ${POSTGRES_USER:-roam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roamdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/scripts/backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roam -d roam"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - roam-network

  # Spring Boot Server
  roam-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roam-server
    ports:
      - "8080:8080"
    environment:
      # CORS configuration - add client origins as needed
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5000,http://host.docker.internal:*"
      # JVM options
      JAVA_OPTS: "-Xmx512m -Xms256m"
      # Database configuration
      SPRING_PROFILES_ACTIVE: postgresql
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-roam}
      DATABASE_USERNAME: ${POSTGRES_USER:-roam}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-roamdev}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - roam-network

  # Python Client (optional - requires X11 display)
  # Uncomment to run client in Docker (Linux with X11 only)
  # roam-client:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.client
  #   container_name: roam-client
  #   environment:
  #     - DISPLAY=${DISPLAY}
  #     - SERVER_URL=http://roam-server:8080
  #   volumes:
  #     - /tmp/.X11-unix:/tmp/.X11-unix:rw
  #     - ${HOME}/.Xauthority:/root/.Xauthority:rw
  #   depends_on:
  #     roam-server:
  #       condition: service_healthy
  #   network_mode: host
  #   # Or use:
  #   # networks:
  #   #   - roam-network

volumes:
  postgres-data:
    driver: local

networks:
  roam-network:
    driver: bridge

