server:
  port: 8080

spring:
  application:
    name: roam-server
  
  # Default profile uses H2 for simplicity
  profiles:
    active: h2
  
  # JPA/Hibernate Configuration
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Logging
logging:
  level:
    com.preponderous.roam: INFO
    org.springframework.web: INFO
    # Hibernate SQL logging disabled by default for production
    # Enable in development profile or set via environment variables
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

# Roam-specific configuration
roam:
  persistence:
    auto-save: false  # Set to true to enable automatic saves every 100 ticks

---
# H2 Profile (default for development and testing)
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/roam-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

# Enable debug logging for H2 development profile
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# PostgreSQL Profile (for production)
spring:
  config:
    activate:
      on-profile: postgresql
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/roam}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:roam}
    password: ${DATABASE_PASSWORD:roam}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

---
# Test Profile (in-memory H2)
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    # Disabled in tests - using ddl-auto: create-drop for faster test execution
    # Tests validate schema compatibility through integration tests
    enabled: false
